---
# Pull Secret Template
#
# To create this secret:
# 1. Download your pull secret from https://console.redhat.com/openshift/install/pull-secret
# 2. Save it to a file (e.g., pull-secret.json)
# 3. Create the secret:
#    oc create secret generic pull-secret \
#      --from-file=.dockerconfigjson=pull-secret.json \
#      --type=kubernetes.io/dockerconfigjson \
#      -n clusters
#
apiVersion: v1
kind: Secret
metadata:
  name: pull-secret
  namespace: clusters
type: kubernetes.io/dockerconfigjson
data:
  # Replace with base64-encoded pull secret
  # .dockerconfigjson: <BASE64_ENCODED_PULL_SECRET>

---
# SSH Key Secret Template
#
# To create this secret:
# 1. Generate an SSH key if you don't have one:
#    ssh-keygen -t ed25519 -f ~/.ssh/hcp-key -N ""
# 2. Create the secret:
#    oc create secret generic ssh-key \
#      --from-file=id_rsa.pub=~/.ssh/hcp-key.pub \
#      -n clusters
#
apiVersion: v1
kind: Secret
metadata:
  name: ssh-key
  namespace: clusters
type: Opaque
data:
  # Replace with base64-encoded SSH public key
  # id_rsa.pub: <BASE64_ENCODED_SSH_PUBLIC_KEY>

---
# ETCD Encryption Key Secret Template (Optional)
#
# To create this secret:
# 1. Generate a random key:
#    openssl rand -base64 32 > etcd-encryption-key.txt
# 2. Create the secret:
#    oc create secret generic etcd-encryption-key \
#      --from-file=key=etcd-encryption-key.txt \
#      -n clusters
#
apiVersion: v1
kind: Secret
metadata:
  name: etcd-encryption-key
  namespace: clusters
type: Opaque
data:
  # Replace with base64-encoded encryption key
  # key: <BASE64_ENCODED_KEY>

---
# Example: Creating secrets using oc CLI (Recommended)
#
# This is the recommended approach rather than editing YAML files:
#
# # Create clusters namespace
# oc create namespace clusters
#
# # Create pull secret
# oc create secret generic pull-secret \
#   --from-file=.dockerconfigjson=/path/to/pull-secret.json \
#   --type=kubernetes.io/dockerconfigjson \
#   -n clusters
#
# # Create SSH key secret
# oc create secret generic ssh-key \
#   --from-file=id_rsa.pub=~/.ssh/hcp-key.pub \
#   -n clusters
#
# # Verify secrets
# oc get secrets -n clusters

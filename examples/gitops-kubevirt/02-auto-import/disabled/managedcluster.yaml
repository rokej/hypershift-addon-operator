apiVersion: cluster.open-cluster-management.io/v1
kind: ManagedCluster
metadata:
  name: example-hcp-disabled
  # Note: No namespace - ManagedCluster is cluster-scoped
spec:
  hubAcceptsClient: true
  leaseDurationSeconds: 60

  # Optional: Add labels to organize clusters
  labels:
    # Environment label
    environment: development
    # Pattern label
    import-pattern: disabled
    # Infrastructure
    infrastructure: kubevirt
    # Custom labels for your use case
    managed-by: gitops
